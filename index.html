<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hilltown Color Club</title>

<style>
@font-face {
  font-family: 'Cml';
  src: url('./Cml.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

body {
  margin: 0;
  padding: 60px 40px;
  background: #ffffff;
  font-family: 'Cml', sans-serif;
  text-align: center;
  color: #111;
  position: relative;
  overflow-x: hidden;
}

/* FLOATING DOODLES */
.doodle {
  position: absolute;
  font-size: 28px;
  opacity: 0.9;
  pointer-events: none;
  animation: floaty 6s ease-in-out infinite;
}

.d1 { top: 40px; left: 10%; animation-duration: 7s; }
.d2 { top: 120px; right: 12%; animation-duration: 5.5s; }
.d3 { bottom: 90px; left: 20%; animation-duration: 6.5s; }
.d4 { bottom: 140px; right: 18%; animation-duration: 8s; }

@keyframes floaty {
  0%   { transform: translate(0px, 0px) rotate(0deg); }
  50%  { transform: translate(10px, -12px) rotate(4deg); }
  100% { transform: translate(0px, 0px) rotate(0deg); }
}

/* LOGO */
.logo {
  max-width: 420px;
  width: 90%;
  margin-bottom: 20px;
  transform: rotate(-1.5deg);
}

/* TITLE */
.title {
  font-size: 48px;
  margin: 10px 0 40px 0;
  line-height: 1.2;
}

/* RAINBOW LETTERING */
.title span:nth-child(6n+1) { color: red; }
.title span:nth-child(6n+2) { color: orange; }
.title span:nth-child(6n+3) { color: gold; }
.title span:nth-child(6n+4) { color: green; }
.title span:nth-child(6n+5) { color: blue; }
.title span:nth-child(6n+6) { color: purple; }

/* HERO PRICE BOX */
.price-box {
  margin: 40px auto;
  max-width: 520px;
  padding: 30px 25px;
  font-size: 34px;
  line-height: 1.4;

  border: 3px solid #000;
  background: #fffdf7;

  transform: rotate(-1.5deg);
  display: inline-block;

  box-shadow: 6px 6px 0px #000;
}

/* SECTION TEXT */
.section {
  margin: 30px auto;
  max-width: 650px;
  font-size: 28px;
  line-height: 1.5;
  transform: rotate(0.7deg);
}

/* STAMP */
.stamp {
  display: inline-block;
  margin-top: 25px;
  padding: 10px 14px;
  border: 2px solid #000;
  transform: rotate(-3deg);
  font-size: 20px;
  background: #fff;
}

/* SMALL TEXT */
.small {
  margin-top: 40px;
  font-size: 24px;
  line-height: 1.5;
  transform: rotate(-0.5deg);
}

/* EMAIL */
a {
  font-size: 22px;
  color: blue;
  text-decoration: underline;
  display: inline-block;
  margin-top: 30px;
}
</style>
</head>

<body>

<!-- DOODLES -->
<div class="doodle d1">★</div>
<div class="doodle d2">✿</div>
<div class="doodle d3">☁︎</div>
<div class="doodle d4">✎</div>

<!-- LOGO -->
<img class="logo" src="htccrainbow.JPG" alt="Hilltown Color Club Logo">

<!-- TITLE -->
<div class="title">
<span>h</span><span>a</span><span>n</span><span>d</span><span>m</span><span>a</span><span>d</span><span>e</span>
&nbsp;
<span>w</span><span>w</span><span>i</span><span>t</span><span>h</span>
&nbsp;
<span>b</span><span>r</span><span>i</span><span>g</span><span>h</span><span>t</span><span>e</span><span>s</span><span>t</span>
&nbsp;
<span>j</span><span>o</span><span>y</span>
<br>
in the hilltowns of western mass
</div>

<!-- HERO PRICE -->
<div class="price-box">
💲10 A PENDANT<br>
OR<br>
3 FOR 💲25
</div>

<!-- INFO -->
<div class="section">
NO TWO EVER THE SAME
</div>

<div class="stamp">
❤️ FUN • AFFORDABLE • HANDMADE • ALWAYS ❤️
</div>

<div class="small">
no haggling please, I'm shy!<br>
gift boxes available free of charge
</div>

<!-- EMAIL -->
<a href="mailto:hilltowncolorclub@gmail.com">
hilltowncolorclub@gmail.com
</a>

</body>
</html>
