<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hilltown Color Club</title>

<style>
@font-face {
  font-family: 'Cml';
  src: url('./Cml.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

body {
  margin: 0;
  padding: 50px;
  background: #ffffff;
  font-family: 'Cml', sans-serif;
  text-align: center;
  color: #111;
}

/* LOGO BIGGER */
.logo {
  max-width: 420px;
  width: 90%;
  margin-bottom: 20px;
  transform: rotate(-1deg);
}

/* TITLE BIG + RAINBOW */
.title {
  font-size: 48px;
  margin: 10px 0 40px 0;
  line-height: 1.2;
}

/* rainbow effect per character */
.title span:nth-child(6n+1) { color: red; }
.title span:nth-child(6n+2) { color: orange; }
.title span:nth-child(6n+3) { color: gold; }
.title span:nth-child(6n+4) { color: green; }
.title span:nth-child(6n+5) { color: blue; }
.title span:nth-child(6n+6) { color: purple; }

/* MAIN BOX */
.box {
  margin: 30px auto;
  padding: 22px;
  border: 2px dashed #000;
  display: inline-block;
  font-size: 26px;
  transform: rotate(0.5deg);
}

/* SECTION TEXT (FIXED SIZE) */
.section {
  margin: 30px auto;
  max-width: 600px;
  font-size: 26px;
  line-height: 1.5;
}

/* BOTTOM TEXT (FIXED READABILITY ISSUE) */
.small {
  margin-top: 35px;
  font-size: 22px;
  line-height: 1.5;
}

/* EMAIL */
a {
  font-size: 22px;
  color: blue;
  text-decoration: underline;
}
</style>
</head>

<body>

<img class="logo" src="htccrainbow.JPG" alt="Hilltown Color Club Logo">

<div class="title">
<span>h</span><span>a</span><span>n</span><span>d</span><span>m</span><span>a</span><span>d</span><span>e</span>
&nbsp;
<span>w</span><span>i</span><span>t</span><span>h</span>
&nbsp;
<span>b</span><span>r</span><span>i</span><span>g</span><span>h</span><span>t</span><span>e</span><span>s</span><span>t</span>
&nbsp;
<span>j</span><span>o</span><span>y</span>
<br>
in the hilltowns of western mass
</div>

<div class="box">
FUN • AFFORDABLE • HANDMADE • ALWAYS • &lt;3
</div>

<div class="section">
$10 A PENDANT OR THREE FOR $25<br>
NO TWO EVER THE SAME
</div>

<div class="small">
no haggling please, I'm shy!<br>
gift boxes available free of charge
</div>

<p>
<a href="mailto:hilltowncolorclub@gmail.com">
hilltowncolorclub@gmail.com
</a>
</p>

</body>
</html>
