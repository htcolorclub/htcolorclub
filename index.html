<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hilltown Color Club</title>

<style>
@font-face {
  font-family: 'Cml';
  src: url('./Cml.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

/* ===== BASE ===== */
body {
  margin: 0;
  padding: 70px 40px;
  font-family: 'Cml', sans-serif;
  text-align: center;
  color: #111;
  background: #ffffff;
  position: relative;
  overflow-x: hidden;

  box-shadow: inset 0 0 120px rgba(0,0,0,0.05);
}

/* ===== PENDANT BORDER (BOTH IMAGES, FULL WRAP PATTERN) ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -10;

  /* BOTH IMAGES USED AS TILE PATTERN */
  background-image:
    url("pendies1.JPG"),
    url("pendies2.JPG");

  /* smaller = more repetition = more “border texture” */
  background-size: 220px, 220px;

  /* offset so they intermix instead of stacking cleanly */
  background-position: 0 0, 110px 110px;

  background-repeat: repeat;

  opacity: 1;

  filter: none;

  /* center cutout stays intact */
  -webkit-mask: radial-gradient(
    circle at center,
    transparent 58%,
    black 78%
  );
  mask: radial-gradient(
    circle at center,
    transparent 58%,
    black 78%
  );
}

/* ===== COLOR FIELD BACKGROUND ===== */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -5;

  background:
    radial-gradient(circle at 10% 20%, rgba(255,0,0,0.08), transparent 25%),
    radial-gradient(circle at 80% 10%, rgba(255,165,0,0.08), transparent 30%),
    radial-gradient(circle at 30% 70%, rgba(0,128,0,0.08), transparent 35%),
    radial-gradient(circle at 90% 80%, rgba(0,0,255,0.08), transparent 30%),
    radial-gradient(circle at 50% 50%, rgba(255,0,255,0.06), transparent 40%);
}

/* ===== LOGO ===== */
.logo {
  max-width: 420px;
  width: 90%;
  margin-bottom: 20px;
  transform: rotate(-1.3deg);
}

/* ===== TITLE ===== */
.title {
  font-size: 48px;
  margin: 10px 0 40px 0;
  line-height: 1.2;
}

.title span:nth-child(6n+1) { color: red; }
.title span:nth-child(6n+2) { color: orange; }
.title span:nth-child(6n+3) { color: gold; }
.title span:nth-child(6n+4) { color: green; }
.title span:nth-child(6n+5) { color: blue; }
.title span:nth-child(6n+6) { color: purple; }

/* ===== PRICE ===== */
.price-box {
  margin: 40px auto;
  max-width: 520px;
  padding: 28px 22px;
  font-size: 34px;
  line-height: 1.4;

  border: 2px solid #000;
  background: #fffdf7;

  transform: rotate(-1.5deg) translateX(-10px);
  display: inline-block;
}

/* ===== CARDS ===== */
.card {
  margin: 35px auto;
  max-width: 520px;
  padding: 18px;
  background: #fff;
  border: 2px solid #000;
  font-size: 24px;
}

.card:nth-of-type(odd) {
  transform: rotate(0.8deg) translateX(-20px);
}

.card:nth-of-type(even) {
  transform: rotate(-0.9deg) translateX(25px);
}

/* ===== GIF STICKER ===== */
.gif-sticker {
  margin: 60px auto;
  width: 260px;
  max-width: 70%;

  display: block;

  border: 2px solid #000;
  background: #fffdf7;

  padding: 6px;

  transform: rotate(3deg);

  box-shadow: 0 0 0 2px rgba(255,0,0,0.15),
              0 0 0 4px rgba(0,255,0,0.10);
}

/* ===== STAMP ===== */
.stamp {
  display: inline-block;
  margin-top: 30px;
  padding: 10px 14px;
  border: 2px solid #000;
  transform: rotate(-2.5deg);
  font-size: 20px;
  background: #fff;
}

/* ===== SMALL TEXT ===== */
.small {
  margin-top: 50px;
  font-size: 24px;
  line-height: 1.5;
  transform: rotate(-0.4deg);
}

/* ===== EMAIL ===== */
a {
  font-size: 22px;
  color: blue;
  text-decoration: none;
  position: relative;
}

a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -3px;
  width: 100%;
  height: 5px;
  background: yellow;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.25s ease;
  z-index: -1;
}

a:hover::after {
  transform: scaleX(1);
}
</style>
</head>

<body>

<img class="logo" src="htccrainbowtransparent.png" alt="Hilltown Color Club Logo">

</html>
