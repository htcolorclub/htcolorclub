<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hilltown Color Club</title>

<style>
@font-face {
  font-family: 'Cml';
  src: url('./Cml.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

body {
  margin: 0;
  padding: 40px;
  background: #fff8f0;
  font-family: 'Cml', sans-serif;
  text-align: center;
  color: #111;
}

.logo {
  max-width: 260px;
  width: 80%;
  margin-bottom: 20px;
  transform: rotate(-1deg);
}

.title {
  font-size: 36px;
  margin: 10px 0 30px 0;
  letter-spacing: 1px;
}

.section {
  margin: 25px auto;
  max-width: 500px;
  font-size: 20px;
  line-height: 1.4;
}

.box {
  margin: 30px auto;
  padding: 18px;
  border: 2px dashed #000;
  display: inline-block;
  transform: rotate(0.5deg);
}

.fun {
  margin-top: 25px;
  font-size: 22px;
  letter-spacing: 1px;
}

.small {
  margin-top: 30px;
  font-size: 16px;
}
</style>
</head>

<body>

<img class="logo" src="htccrainbow.JPG" alt="Hilltown Color Club Logo">

<div class="title">
handmade with brightest joy<br>
in the hilltowns of western mass
</div>

<div class="box">
FUN • AFFORDABLE • HANDMADE • ALWAYS • &lt;3
</div>

<div class="section">
$10 A PENDANT OR THREE FOR $25<br>
NO TWO EVER THE SAME
</div>

<div class="small">
no haggling please, I'm shy!<br>
gift boxes available free of charge
</div>

</body>
</html>
