<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hilltown Color Club</title>

<style>
@font-face {
  font-family: 'Cml';
  src: url('./Cml.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

/* ===== PAGE BASE ===== */
body {
  margin: 0;
  padding: 60px 40px;
  font-family: 'Cml', sans-serif;
  background: #ffffff;
  text-align: center;
  color: #111;
  position: relative;
  overflow-x: hidden;
}

/* ===== HAND-DRAWN BORDER FRAME ===== */
.frame {
  position: fixed;
  top: 18px;
  left: 18px;
  right: 18px;
  bottom: 18px;
  border: 3px dashed #000;
  pointer-events: none;
  z-index: 10;
}

/* ===== PAPER LAYERS (uneven collage feel) ===== */
.paper {
  position: fixed;
  width: 110%;
  height: 110%;
  top: -5%;
  left: -5%;
  z-index: -3;
}

.paper::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: #fffdf7;
  transform: rotate(-1.2deg);
}

.paper::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: #f7fbff;
  transform: rotate(0.8deg);
  opacity: 0.6;
}

/* ===== COLORFUL DOODLE LAYER ===== */
.doodles {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  font-size: 28px;
  pointer-events: none;
  z-index: 0;
}

.doodles span {
  position: absolute;
  opacity: 0.9;
}

.r  { top: 80px; left: 10%; color: red; }
.o  { top: 200px; right: 12%; color: orange; }
.y  { bottom: 140px; left: 18%; color: gold; }
.g  { top: 320px; right: 20%; color: green; }
.b  { bottom: 220px; right: 14%; color: blue; }
.p  { top: 450px; left: 25%; color: purple; }

/* ===== LOGO ===== */
.logo {
  max-width: 420px;
  width: 90%;
  margin-bottom: 20px;
  transform: rotate(-1.5deg);
  z-index: 2;
  position: relative;
}

/* ===== TITLE ===== */
.title {
  font-size: 48px;
  margin: 10px 0 40px 0;
  line-height: 1.2;
  z-index: 2;
  position: relative;
}

/* rainbow letters */
.title span:nth-child(6n+1) { color: red; }
.title span:nth-child(6n+2) { color: orange; }
.title span:nth-child(6n+3) { color: gold; }
.title span:nth-child(6n+4) { color: green; }
.title span:nth-child(6n+5) { color: blue; }
.title span:nth-child(6n+6) { color: purple; }

/* ===== PRICE HERO CARD ===== */
.price-box {
  margin: 40px auto;
  max-width: 520px;
  padding: 30px 25px;
  font-size: 34px;
  line-height: 1.4;

  border: 3px solid #000;
  background: #fffdf7;

  transform: rotate(-1.5deg);
  display: inline-block;

  box-shadow: 6px 6px 0px #000;
  z-index: 2;
  position: relative;
}

/* ===== STICKER PRODUCT CARDS ===== */
.card {
  margin: 30px auto;
  max-width: 520px;
  padding: 20px;
  background: #fff;
  border: 2px solid #000;
  box-shadow: 4px 4px 0px #000;
  transform: rotate(0.8deg);
  font-size: 24px;
  position: relative;
  z-index: 2;
}

/* slight variation for “handmade mismatch” */
.card:nth-of-type(even) {
  transform: rotate(-1deg);
}

/* ===== STAMP ===== */
.stamp {
  display: inline-block;
  margin-top: 25px;
  padding: 10px 14px;
  border: 2px solid #000;
  transform: rotate(-3deg);
  font-size: 20px;
  background: #fff;
  z-index: 2;
  position: relative;
}

/* ===== SMALL TEXT ===== */
.small {
  margin-top: 40px;
  font-size: 24px;
  line-height: 1.5;
  transform: rotate(-0.5deg);
  z-index: 2;
  position: relative;
}

/* ===== EMAIL ===== */
a {
  font-size: 22px;
  color: blue;
  text-decoration: none;
  position: relative;
  z-index: 2;
}

/* animated marker underline */
a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -3px;
  width: 100%;
  height: 6px;
  background: yellow;
  z-index: -1;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}

a:hover::after {
  transform: scaleX(1);
}
</style>
</head>

<body>

<!-- FRAME -->
<div class="frame"></div>

<!-- PAPER LAYERS -->
<div class="paper"></div>

<!-- DOODLES -->
<div class="doodles">
  <span class="r">★</span>
  <span class="o">✿</span>
  <span class="y">☀︎</span>
  <span class="g">☁︎</span>
  <span class="b">✎</span>
  <span class="p">♡</span>
</div>

<!-- LOGO -->
<img class="logo" src="htccrainbow.JPG" alt="Hilltown Color Club Logo">

<!-- TITLE -->
<div class="title">
<span>h</span><span>a</span><span>n</span><span>d</span><span>m</span><span>a</span><span>d</span><span>e</span>
&nbsp;
<span>w</span><span>w</span><span>i</span><span>t</span><span>h</span>
&nbsp;
<span>b</span><span>r</span><span>i</span><span>g</span><span>h</span><span>t</span><span>e</span><span>s</span><span>t</span>
&nbsp;
<span>j</span><span>o</span><span>y</span>
<br>
in the hilltowns of western mass
</div>

<!-- PRICE HERO -->
<div class="price-box">
💲10 A PENDANT<br>
OR<br>
3 FOR 💲25
</div>

<!-- PRODUCT CARD STYLE SECTION -->
<div class="card">
NO TWO EVER THE SAME
</div>

<div class="card">
FUN • AFFORDABLE • HANDMADE • ALWAYS • ❤️
</div>

<!-- STAMP -->
<div class="stamp">
NO HAGGLING PLEASE, I'M SHY!
</div>

<!-- SMALL TEXT -->

gift boxes available free of charge
</div>

<!-- EMAIL -->
<p>
<a href="mailto:hilltowncolorclub@gmail.com">
hilltowncolorclub@gmail.com
</a>
</p>

</body>
</html>
