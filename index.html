<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hilltown Color Club</title>

<style>
@font-face {
  font-family: 'Cml';
  src: url('./Cml.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

/* ===== BASE ===== */
body {
  margin: 0;
  padding: 60px 40px;
  font-family: 'Cml', sans-serif;
  text-align: center;
  color: #111;
  background: #ffffff;
  position: relative;
  overflow-x: hidden;
}

/* ===== COLORFUL DOODLE BACKGROUND ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -5;

  background:
    radial-gradient(circle at 10% 20%, rgba(255,0,0,0.08), transparent 25%),
    radial-gradient(circle at 80% 10%, rgba(255,165,0,0.08), transparent 30%),
    radial-gradient(circle at 30% 70%, rgba(0,128,0,0.08), transparent 35%),
    radial-gradient(circle at 90% 80%, rgba(0,0,255,0.08), transparent 30%),
    radial-gradient(circle at 50% 50%, rgba(255,0,255,0.06), transparent 40%);
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -4;
  opacity: 0.18;

  background-image:
    repeating-linear-gradient(
      45deg,
      transparent,
      transparent 22px,
      rgba(0,0,0,0.03) 22px,
      rgba(0,0,0,0.03) 23px
    );
}

/* ===== LOGO ===== */
.logo {
  max-width: 420px;
  width: 90%;
  margin-bottom: 20px;
  transform: rotate(-1.2deg);
}

/* ===== TITLE ===== */
.title {
  font-size: 48px;
  margin: 10px 0 40px 0;
  line-height: 1.2;
}

/* rainbow letters */
.title span:nth-child(6n+1) { color: red; }
.title span:nth-child(6n+2) { color: orange; }
.title span:nth-child(6n+3) { color: gold; }
.title span:nth-child(6n+4) { color: green; }
.title span:nth-child(6n+5) { color: blue; }
.title span:nth-child(6n+6) { color: purple; }

/* ===== PRICE ===== */
.price-box {
  margin: 40px auto;
  max-width: 520px;
  padding: 28px 22px;
  font-size: 34px;
  line-height: 1.4;

  border: 2px solid #000;
  background: #fffdf7;

  transform: rotate(-1.2deg);
  display: inline-block;
}

/* ===== CARDS (kept simple, no shadows) ===== */
.card {
  margin: 30px auto;
  max-width: 520px;
  padding: 18px;
  background: #fff;
  border: 2px solid #000;
  transform: rotate(0.6deg);
  font-size: 24px;
}

.card:nth-of-type(even) {
  transform: rotate(-0.8deg);
}

/* ===== STAMP (SIMPLIFIED, NO EFFECTS) ===== */
.stamp {
  display: inline-block;
  margin-top: 25px;
  padding: 10px 14px;
  border: 2px solid #000;
  transform: rotate(-2.5deg);
  font-size: 20px;
  background: #fff;
}

/* ===== SMALL TEXT ===== */
.small {
  margin-top: 40px;
  font-size: 24px;
  line-height: 1.5;
  transform: rotate(-0.4deg);
}

/* ===== EMAIL ===== */
a {
  font-size: 22px;
  color: blue;
  text-decoration: none;
  position: relative;
}

/* subtle marker underline only */
a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -3px;
  width: 100%;
  height: 5px;
  background: yellow;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.25s ease;
  z-index: -1;
}

a:hover::after {
  transform: scaleX(1);
}
</style>
</head>

<body>

<!-- LOGO -->
<img class="logo" src="htccrainbowtransparent.png" alt="Hilltown Color Club Logo">

<!-- TITLE -->
<div class="title">
<span>h</span><span>a</span><span>n</span><span>d</span><span>m</span><span>a</span><span>d</span><span>e</span>
&nbsp;
<span>w</span><span>i</span><span>t</span><span>h</span>
&nbsp;
<span>b</span><span>r</span><span>i</span><span>g</span><span>h</span><span>t</span><span>e</span><span>s</span><span>t</span>
&nbsp;
<span>j</span><span>o</span><span>y</span>
<br>
in the hilltowns of western mass
</div>

<!-- PRICE (UPDATED TEXT) -->
<div class="price-box">
💲10 A PENDANT<br>
OR<br>
THREE FOR 💲25
</div>

<!-- CARDS -->
<div class="card">
NO TWO EVER THE SAME
</div>

<div class="card">
❤️Fun ಄ Affordable ☼ Handmade 🚀<br>
  ⋆｡°✩ ALWAYS ✩°⋆｡
</div>

<!-- STAMP -->
<div class="stamp">
NO HAGGLING PLEASE, I'M SHY!
</div>

<!-- SMALL -->
<div class="small">
gift boxes available free of charge
</div>

<!-- EMAIL -->
<p>
<a href="mailto:hilltowncolorclub@gmail.com">
hilltowncolorclub@gmail.com
</a>
</p>

</body>
</html>
